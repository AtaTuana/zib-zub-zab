<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onnumarasinnoktakom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

:root { --dark-color: #1a0a2e; }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background-color: var(--dark-color);
  overflow: hidden;
  perspective: 1000px;
  font-family: 'Jost', sans-serif;
}

/* ── NIGHT BACKGROUND (from original) ── */
.night {
  position: fixed;
  left: 50%; top: 0;
  transform: translateX(-50%);
  width: 100%; height: 100%;
  filter: blur(0.1vmin);
  background-image:
    radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
    radial-gradient(ellipse at bottom, var(--dark-color), rgba(180, 100, 255, 0.15)),
    repeating-linear-gradient(220deg, rgb(26,10,46) 0px, rgb(26,10,46) 19px, transparent 19px, transparent 22px),
    repeating-linear-gradient(189deg, rgb(26,10,46) 0px, rgb(26,10,46) 19px, transparent 19px, transparent 22px),
    repeating-linear-gradient(148deg, rgb(26,10,46) 0px, rgb(26,10,46) 19px, transparent 19px, transparent 22px),
    linear-gradient(90deg, rgb(180, 100, 255), rgb(240, 200, 255));
}

/* ── FLOWERS (original structure, recolored) ── */
.flowers {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  transform-origin: bottom center;
  z-index: 30; /* in FRONT of envelope */
}

.flower {
  position: absolute;
  bottom: 10vmin;
  transform-origin: bottom center;
  z-index: 10;
  --fl-speed: 2s;
}

.flower--1 { animation: moving-flower-1 7s ease-in-out infinite; }
.flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
.flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 4.8s backwards; }
.flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 4.2s backwards; }
.flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 3.6s backwards; }
.flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 3.0s backwards; }
.flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 5.4s backwards; }
.flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left  var(--fl-speed) 6.0s backwards; }
.flower--1 .flower__leafs { animation-delay: 3s; }

.flower--2 { left: 50%; transform: rotate(20deg); animation: moving-flower-2 8s ease-in-out infinite; }
.flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s; }
.flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 5.7s backwards; }
.flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 5.1s backwards; }
.flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 4.5s backwards; }
.flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 3.9s backwards; }
.flower--2 .flower__leafs { animation-delay: 4s; }

.flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 9s ease-in-out infinite; }
.flower--3 .flower__line { animation-delay: 0.9s; }
.flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 7.5s backwards; }
.flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 6.9s backwards; }
.flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 6.3s backwards; }
.flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 5.7s backwards; }
.flower--3 .flower__leafs { animation-delay: 5s; }

.flower__leafs {
  position: relative;
  animation: blooming-flower 8s backwards;
}
.flower__leafs::after {
  content: "";
  position: absolute;
  left: 0; top: 0;
  transform: translate(-50%, -100%);
  width: 8vmin; height: 8vmin;
  background-color: #d4a0ff;
  filter: blur(10vmin);
}

/* petals — recolored from teal to purple/pink */
.flower__leaf {
  position: absolute;
  bottom: 0; left: 50%;
  width: 8vmin; height: 11vmin;
  border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
  background-color: #e8b4f8;
  background-image: linear-gradient(to top, #b06cd4, #f0c8ff);
  transform-origin: bottom center;
  opacity: 0.9;
  box-shadow: inset 0 0 2vmin rgba(255,255,255,0.5);
}
.flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
.flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
.flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
.flower__leaf--4 {
  width: 8vmin; height: 8vmin;
  transform-origin: bottom left;
  border-radius: 4vmin 10vmin 4vmin 4vmin;
  transform: translate(-0%, 18%) rotateX(70deg) rotate(-43deg);
  background-image: linear-gradient(to top, #9040c0, #e8b4f8);
  z-index: 1; opacity: 0.8;
}

.flower__white-circle {
  position: absolute;
  left: -3.5vmin; top: -3vmin;
  width: 9vmin; height: 4vmin;
  border-radius: 50%;
  background-color: #fff9ff;
}
.flower__white-circle::after {
  content: "";
  position: absolute;
  left: 50%; top: 45%;
  transform: translate(-50%,-50%);
  width: 60%; height: 60%;
  border-radius: inherit;
  background-image:
    repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    repeating-linear-gradient(45deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    linear-gradient(90deg, rgb(255,200,230), rgb(230,180,255));
}

/* stem — recolored to green (kept original) */
.flower__line {
  height: 55vmin;
  width: 1.5vmin;
  background-image:
    linear-gradient(to left, rgba(0,0,0,.2), transparent, rgba(255,255,255,.2)),
    linear-gradient(to top, transparent 10%, #5a9e6a, #8cd4a0);
  box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
  animation: grow-flower-tree 12s backwards;
}

.flower__line__leaf {
  --w: 7vmin;
  --h: calc(var(--w) + 2vmin);
  position: absolute;
  top: 20%; left: 90%;
  width: var(--w); height: var(--h);
  border-top-right-radius: var(--h);
  border-bottom-left-radius: var(--h);
  background-image: linear-gradient(to top, rgba(90,158,106,.4), #8cd4a0);
}
.flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
.flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
.flower__line__leaf--3,
.flower__line__leaf--4,
.flower__line__leaf--6 {
  border-top-right-radius: 0; border-bottom-left-radius: 0;
  border-top-left-radius: var(--h); border-bottom-right-radius: var(--h);
  left: -460%; top: 12%;
  transform: rotate(-70deg) rotateY(30deg);
}
.flower__line__leaf--4 { top: 40%; }
.flower__line__leaf--5 { top: 0; transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0.6); }
.flower__line__leaf--6 { top: -2%; left: -450%; transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0.6); }

/* sparkles — recolored */
.flower__light {
  position: absolute;
  bottom: 0vmin;
  width: 1vmin; height: 1vmin;
  background-color: rgb(255,200,230);
  border-radius: 50%;
  filter: blur(0.2vmin);
  animation: light-ans 4s linear infinite backwards;
}
.flower__light:nth-child(odd) { background-color: #d4a0ff; }
.flower__light--1 { left: -2vmin; animation-delay: 1s; }
.flower__light--2 { left: 3vmin;  animation-delay: 0.5s; }
.flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
.flower__light--4 { left: 6vmin;  animation-delay: 0.9s; }
.flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
.flower__light--6 { left: -4vmin; animation-delay: 3s; }
.flower__light--7 { left: 3vmin;  animation-delay: 2s; }
.flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

/* grass — kept green */
.flower__grass {
  --c: #5a9e6a;
  --line-w: 1.5vmin;
  position: absolute;
  bottom: 12vmin; left: -7vmin;
  display: flex; flex-direction: column; align-items: flex-end;
  z-index: 20;
  transform-origin: bottom center;
  transform: rotate(-48deg) rotateY(40deg);
}
.flower__grass--1 { animation: moving-grass 2s linear infinite; }
.flower__grass--2 {
  left: 2vmin; bottom: 10vmin;
  transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
  opacity: 0.8; z-index: 0;
  animation: moving-grass--2 1.5s linear infinite;
}
.flower__grass--top {
  width: 7vmin; height: 10vmin;
  border-top-right-radius: 100%;
  border-right: var(--line-w) solid var(--c);
  transform-origin: bottom center; transform: rotate(-2deg);
}
.flower__grass--bottom {
  margin-top: -2px;
  width: var(--line-w); height: 25vmin;
  background-image: linear-gradient(to top, transparent, var(--c));
}
.flower__grass__leaf {
  --size: 10vmin;
  position: absolute;
  width: calc(var(--size)*2.1); height: var(--size);
  border-top-left-radius: var(--size); border-top-right-radius: var(--size);
  background-image: linear-gradient(to top, transparent, transparent 30%, var(--c));
  z-index: 100;
}
.flower__grass__leaf--1 { top:-6%; left:30%; --size:6vmin; transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
.flower__grass__leaf--2 { top:-5%; left:-110%; --size:6vmin; transform:rotate(10deg); animation:growing-grass-ans--2 2s 2.4s linear backwards; }
.flower__grass__leaf--3 { top:5%; left:60%; --size:8vmin; transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
.flower__grass__leaf--4 { top:6%; left:-135%; --size:8vmin; transform:rotate(2deg); animation:growing-grass-ans--4 2s 2s linear backwards; }
.flower__grass__leaf--5 { top:20%; left:60%; --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
.flower__grass__leaf--6 { top:22%; left:-180%; --size:10vmin; transform:rotate(10deg); animation:growing-grass-ans--6 2s 1.6s linear backwards; }
.flower__grass__leaf--7 { top:39%; left:70%; --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
.flower__grass__leaf--8 { top:40%; left:-215%; --size:11vmin; transform:rotate(10deg); animation:growing-grass-ans--8 2s 1.2s linear backwards; }
.flower__grass__overlay {
  position: absolute; top: -10%; right: 0%;
  width: 100%; height: 100%;
  background-color: rgba(26,10,46,0.6);
  filter: blur(1.5vmin); z-index: 100;
}

/* g-long */
.flower__g-long {
  --w: 2vmin; --h: 6vmin; --c: #5a9e6a;
  position: absolute; bottom: 10vmin; left: -3vmin;
  transform-origin: bottom center;
  transform: rotate(-30deg) rotateY(-20deg);
  display: flex; flex-direction: column; align-items: flex-end;
  animation: flower-g-long-ans 3s linear infinite;
}
.flower__g-long__top {
  top: calc(var(--h)*-1);
  width: calc(var(--w)+1vmin); height: var(--h);
  border-top-right-radius: 100%;
  border-right: 0.7vmin solid var(--c);
  transform: translate(-0.7vmin, 1vmin);
}
.flower__g-long__bottom {
  width: var(--w); height: 50vmin;
  transform-origin: bottom center;
  background-image: linear-gradient(to top, transparent 30%, var(--c));
  box-shadow: inset 0 0 2px rgba(0,0,0,.5);
  clip-path: polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
}

/* g-right */
.flower__g-right {
  position: absolute; bottom: 6vmin; left: -2vmin;
  transform-origin: bottom left; transform: rotate(20deg);
}
.flower__g-right .leaf {
  width: 30vmin; height: 50vmin;
  border-top-left-radius: 100%;
  border-left: 2vmin solid #4a8e5a;
  background-image: linear-gradient(to bottom, transparent, var(--dark-color) 60%);
  -webkit-mask-image: linear-gradient(to top, transparent 30%, #4a8e5a 60%);
}
.flower__g-right--1 { animation: flower-g-right-ans 2.5s linear infinite; }
.flower__g-right--2 {
  left: 5vmin; transform: rotateY(-180deg);
  animation: flower-g-right-ans--2 3s linear infinite;
}
.flower__g-right--2 .leaf { height: 75vmin; filter: blur(0.3vmin); opacity: 0.8; }

/* g-front */
.flower__g-front {
  position: absolute; bottom: 6vmin; left: 2.5vmin;
  z-index: 100; transform-origin: bottom center;
  transform: rotate(-28deg) rotateY(30deg) scale(1.04);
  animation: flower__g-front-ans 2s linear infinite;
}
.flower__g-front__line {
  width: 0.3vmin; height: 20vmin;
  background-image: linear-gradient(to top, transparent, #4a8e5a, transparent 100%);
  position: relative;
}
.flower__g-front__leaf-wrapper {
  position: absolute; top: 0; left: 0;
  transform-origin: bottom left; transform: rotate(10deg);
}
.flower__g-front__leaf-wrapper:nth-child(even) {
  left: 0vmin; transform: rotateY(-180deg) rotate(5deg);
  animation: flower__g-front__leaf-left-ans 1s ease-in backwards;
}
.flower__g-front__leaf-wrapper:nth-child(odd) { animation: flower__g-front__leaf-ans 1s ease-in backwards; }
.flower__g-front__leaf-wrapper--1 { top:-8vmin; transform:scale(0.7); animation: flower__g-front__leaf-ans 1s 5.5s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--2 { top:-8vmin; transform:rotateY(-180deg) scale(0.7) !important; animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--3 { top:-3vmin; animation: flower__g-front__leaf-ans 1s 4.6s ease-in backwards; }
.flower__g-front__leaf-wrapper--4 { top:-3vmin; transform:rotateY(-180deg) scale(0.9) !important; animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--5, .flower__g-front__leaf-wrapper--6 { top: 2vmin; }
.flower__g-front__leaf-wrapper--7, .flower__g-front__leaf-wrapper--8 { top: 6.5vmin; }
.flower__g-front__leaf-wrapper--2 { animation-delay: 5.2s !important; }
.flower__g-front__leaf-wrapper--3 { animation-delay: 4.9s !important; }
.flower__g-front__leaf-wrapper--5 { animation-delay: 4.3s !important; }
.flower__g-front__leaf-wrapper--6 { animation-delay: 4.1s !important; }
.flower__g-front__leaf-wrapper--7 { animation-delay: 3.8s !important; }
.flower__g-front__leaf-wrapper--8 { animation-delay: 3.5s !important; }
.flower__g-front__leaf {
  width: 10vmin; height: 10vmin;
  border-radius: 100% 0% 0% 100% / 100% 100% 0% 0%;
  box-shadow: inset 0 2px 1vmin hsla(184,97%,58%,.2);
  background-image:
    linear-gradient(to bottom left, transparent, var(--dark-color)),
    linear-gradient(to bottom right, #4a8e5a 50%, transparent 50%);
  -webkit-mask-image: linear-gradient(to bottom right, #4a8e5a 50%, transparent 50%);
  mask-image: linear-gradient(to bottom right, #4a8e5a 50%, transparent 50%);
}

/* g-fr */
.flower__g-fr {
  position: absolute; bottom: -4vmin; left: 0;
  transform-origin: bottom left; z-index: 10;
  animation: flower__g-fr-ans 2s linear infinite;
}
.flower__g-fr .leaf {
  width: 30vmin; height: 50vmin;
  border-top-left-radius: 100%;
  border-left: 2vmin solid #4a8e5a;
  -webkit-mask-image: linear-gradient(to top, transparent 25%, #4a8e5a 50%);
  position: relative; z-index: 1;
}
.flower__g-fr__leaf {
  position: absolute; top: 0; left: 0;
  width: 10vmin; height: 10vmin;
  border-radius: 100% 0% 0% 100% / 100% 100% 0% 0%;
  box-shadow: inset 0 2px 1vmin hsla(184,97%,58%,.2);
  background-image:
    linear-gradient(to bottom left, transparent, var(--dark-color) 98%),
    linear-gradient(to bottom right, #3adf90 45%, transparent 50%);
  -webkit-mask-image: linear-gradient(135deg, #4a8e5a 40%, transparent 50%);
}
.flower__g-fr__leaf--1 { left:20vmin; transform:rotate(45deg); animation:flower__g-fr-leaft-ans-1 0.5s 5.2s linear backwards; }
.flower__g-fr__leaf--2 { left:12vmin; top:-7vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 5s linear backwards; }
.flower__g-fr__leaf--3 { left:15vmin; top:6vmin; transform:rotate(55deg); animation:flower__g-fr-leaft-ans-5 0.5s 4.8s linear backwards; }
.flower__g-fr__leaf--4 { left:6vmin; top:-2vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 4.6s linear backwards; }
.flower__g-fr__leaf--5 { left:10vmin; top:14vmin; transform:rotate(55deg); animation:flower__g-fr-leaft-ans-5 0.5s 4.4s linear backwards; }
.flower__g-fr__leaf--6 { left:0vmin; top:6vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 4.2s linear backwards; }
.flower__g-fr__leaf--7 { left:5vmin; top:22vmin; transform:rotate(45deg); animation:flower__g-fr-leaft-ans-7 0.5s 4s linear backwards; }
.flower__g-fr__leaf--8 { left:-4vmin; top:15vmin; transform:rotate(15deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-8 0.5s 3.8s linear backwards; }

/* long-g */
.long-g {
  position: absolute; bottom: 25vmin; left: -42vmin;
  transform-origin: bottom left;
}
.long-g--1 { bottom:0; transform:scale(0.8) rotate(-5deg); }
.long-g--1 .leaf { -webkit-mask-image:linear-gradient(to top, transparent 40%, #4a8e5a 80%) !important; }
.long-g--1 .leaf--1 { --w:5vmin; --h:60vmin; left:-2vmin; transform:rotate(3deg) rotateY(-180deg); }
.long-g--2, .long-g--3 { bottom:-3vmin; left:-35vmin; transform-origin:center; transform:scale(0.6) rotateX(60deg); }
.long-g--2 .leaf, .long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top, transparent 50%, #4a8e5a 80%) !important; }
.long-g--2 .leaf--1 { left:-1vmin; transform:rotateY(-180deg); }
.long-g--3 { left:-17vmin; bottom:0; }
.long-g--4 { left:25vmin; bottom:-3vmin; transform-origin:center; transform:scale(0.6) rotateX(60deg); }
.long-g--4 .leaf { -webkit-mask-image:linear-gradient(to top, transparent 50%, #4a8e5a 80%) !important; }
.long-g--5 { left:42vmin; bottom:0; transform:scale(0.8) rotate(2deg); }
.long-g--6 { left:0; bottom:-20vmin; z-index:100; filter:blur(0.3vmin); transform:scale(0.8) rotate(2deg); }
.long-g--7 { left:35vmin; bottom:20vmin; z-index:-1; filter:blur(0.3vmin); transform:scale(0.6) rotate(2deg); opacity:0.7; }
.long-g .leaf {
  --w: 15vmin; --h: 40vmin; --c: #3a7e4a;
  position: absolute; bottom: 0;
  width: var(--w); height: var(--h);
  border-top-left-radius: 100%;
  border-left: 2vmin solid var(--c);
  -webkit-mask-image: linear-gradient(to top, transparent 20%, var(--dark-color));
  transform-origin: bottom center;
}
.long-g .leaf--0 { left:2vmin; animation:leaf-ans-1 4s linear infinite; }
.long-g .leaf--1 { --w:5vmin; --h:60vmin; animation:leaf-ans-1 4s linear infinite; }
.long-g .leaf--2 { --w:10vmin; --h:40vmin; left:-0.5vmin; bottom:5vmin; transform-origin:bottom left; transform:rotateY(-180deg); animation:leaf-ans-2 3s linear infinite; }
.long-g .leaf--3 { --w:5vmin; --h:30vmin; left:-1vmin; bottom:3.2vmin; transform-origin:bottom left; transform:rotate(-10deg) rotateY(-180deg); animation:leaf-ans-3 3s linear infinite; }

.grow-ans { animation: grow-ans 6s var(--d) backwards; }
.growing-grass { animation: growing-grass-ans 3s 6s backwards; }
.not-loaded * { animation-play-state: paused !important; }

/* ── KEYFRAMES (all original) ── */
@keyframes grow-ans { 0% { transform:scale(0); opacity:0; } }
@keyframes light-ans {
  0%   { opacity:0; transform:translateY(0vmin); }
  25%  { opacity:1; transform:translateY(-5vmin) translateX(-2vmin); }
  50%  { opacity:1; transform:translateY(-15vmin) translateX(2vmin); filter:blur(0.2vmin); }
  75%  { transform:translateY(-20vmin) translateX(-2vmin); filter:blur(0.2vmin); }
  100% { transform:translateY(-30vmin); opacity:0; filter:blur(1vmin); }
}
@keyframes moving-flower-1 { 0%,100% { transform:rotate(1deg); } 50% { transform:rotate(-1deg); } }
@keyframes moving-flower-2 { 0%,100% { transform:rotate(20deg); } 50% { transform:rotate(17deg); } }
@keyframes moving-flower-3 { 0%,100% { transform:rotate(-15deg); } 50% { transform:rotate(-17deg); } }
@keyframes blooming-leaf-right { 0% { transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(0); } }
@keyframes blooming-leaf-left  { 0% { transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(0); } }
@keyframes grow-flower-tree { 0% { height:0; border-radius:1vmin; } }
@keyframes blooming-flower { 0% { transform:scale(0); } }
@keyframes moving-grass    { 0%,100% { transform:rotate(-48deg) rotateY(40deg); } 50% { transform:rotate(-50deg) rotateY(40deg); } }
@keyframes moving-grass--2 { 0%,100% { transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform:scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
@keyframes growing-grass-ans { 0% { transform:scale(0); } }
@keyframes growing-grass-ans--1 { 0% { transform-origin:bottom left; transform:rotate(-20deg) scale(0); } }
@keyframes growing-grass-ans--2 { 0% { transform-origin:bottom right; transform:rotate(10deg) scale(0); } }
@keyframes growing-grass-ans--3 { 0% { transform-origin:bottom left; transform:rotate(-18deg) rotateX(-20deg) scale(0); } }

/* ══════════════════════════════════════════
   HINT
══════════════════════════════════════════ */
.hint {
  position: fixed; top: 26px; right: 28px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  z-index: 200;
  transition: opacity 0.5s ease;
}
.hint.gone { opacity: 0; pointer-events: none; }
.hint-text { font-weight: 200; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #d4a0ff; }
.hint svg { width: 48px; height: 40px; }

/* ══════════════════════════════════════════
   ENVELOPE SCENE
   z-index: 20 — above the flower roots but the
   flowers layer (.flowers) is z-index: 30 so it
   renders in front
══════════════════════════════════════════ */
.scene {
  position: relative;
  width: 260px; height: 170px;
  cursor: pointer;
  z-index: 20;
  perspective: 600px;
  /* lift off the bottom so flowers feel like they're behind+around */
  margin-bottom: 12vmin;
}
.scene.done { cursor: default; pointer-events: none; }

/* GIFT CARD
   Strateji:
   - Kart scene içinde absolute, z-index 4 (flap=6, env-body=3)
   - Kart başta opacity:0
   - .show ile opacity:1 olur ama hala envelope body (z:3) + flap (z:6) arasında sıkışık
   - Flap açılınca (rotateX -182deg) flap arkaya döner, kart üstten görünür
   - .rise ile kart yukarı çıkar — ama alt kısmı env-body (z:3) tarafından KAPATILMAYA devam eder
     çünkü env-body z-index:3, kart z-index:4 — kart önde
   - Bunun yerine: env-body'yi z:5 yapıyoruz, kartı z:4 yapıyoruz
     Böylece env-body kartın ALT kısmını kapatır, flap açılınca üst kısım görünür
*/
.card {
  position: absolute;
  left: 50%; bottom: 10px;
  width: 195px;
  transform: translateX(-50%) rotate(4deg);
  background: linear-gradient(150deg, #fff8ff 0%, #fdf0fc 100%);
  border: 1px solid rgba(180,120,220,0.22);
  border-radius: 4px;
  padding: 14px 14px 16px;
  opacity: 0;
  box-shadow: 0 6px 24px rgba(120,60,180,0.15);
  z-index: 4;
  transition: opacity 0s, bottom 0s;
}
.card.show { opacity: 1; }
.card.rise {
  bottom: 160px;
  z-index: 4; /* env-body (z:5) hala alttaki kısmı kapatır */
  transition: bottom 0.9s cubic-bezier(0.34,1.5,0.64,1);
}
.card-body {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: 12px; line-height: 1.9;
  color: #5a3878; text-align: center;
}
.card-rule {
  width: 50%; height: 1px; margin: 8px auto;
  background: linear-gradient(90deg, transparent, rgba(160,100,200,0.3), transparent);
}
.card-sig {
  display: block; text-align: center;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 10px; color: rgba(140,80,190,0.5);
  margin-top: 4px; letter-spacing: 0.12em;
}

/* ENVELOPE */
.envelope { position: absolute; bottom: 0; left: 0; width: 260px; height: 165px; }
.env-body {
  position: absolute; inset: 0; border-radius: 5px;
  background: linear-gradient(148deg, #3a1a5e 0%, #4e2070 55%, #5c1848 100%);
  border: 1px solid rgba(180,120,220,0.35);
  box-shadow: 0 16px 44px rgba(100,40,160,0.4), 0 3px 8px rgba(100,40,160,0.2);
  z-index: 5;
}
/* crease triangles removed — flat envelope */
.env-flap {
  position:absolute;top:0;left:0;width:260px;height:90px;
  transform-origin:top center;transform-style:preserve-3d;
  transition:transform 0.80s cubic-bezier(0.4,0,0.2,1);z-index:7;
}
.scene.open .env-flap { transform: rotateX(-182deg); }
.env-flap svg { display:block;width:260px;height:90px; }
.seal-g { transition:opacity 0.25s ease 0.1s; }
.scene.open .seal-g { opacity:0; }
</style>
</head>

<script>
// page load animation pause/play (original logic)
onload = () => {
  const c = setTimeout(() => {
    document.body.classList.remove("not-loaded");
    clearTimeout(c);
  }, 1000);
};

let clicked = false;

function handleClick() {
  if (clicked) return;
  clicked = true;

  const scene = document.getElementById('scene');
  scene.classList.add('open', 'done');
  document.getElementById('hint').classList.add('gone');

  // flap açılınca z-index'i sıfırla ki kart görünsün
  setTimeout(() => {
    document.getElementById('envFlap').style.zIndex = '0';
  }, 820); // flap transition 0.8s bittikten sonra

  // show card after flap opens
  setTimeout(() => document.getElementById('card').classList.add('show'), 850);
  setTimeout(() => document.getElementById('card').classList.add('rise'), 1000);

  // show flowers
  setTimeout(() => {
    const fw = document.getElementById('flowersWrap');
    fw.style.display = '';
    // restart flower animations from zero
    fw.querySelectorAll('*').forEach(el => {
      el.style.animationPlayState = 'running';
    });
  }, 1100);
}
</script>
